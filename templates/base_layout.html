{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);}());</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}The Papuan Thought Project{% endblock %}</title>
  <meta name="description" content="{% block description %}A curated social writing network for Papuan voices.{% endblock %}" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    [x-cloak] { display: none !important; }
    body { font-family: 'Onest', sans-serif; }

    /* ── Theme tokens ──────────────────────────────── */
    :root {
      --bg-base:     #111216;
      --bg-surface:  #18191e;
      --bg-compose:  #1d1e24;
      --bg-hover:    #202228;
      --bg-active:   #25272e;
      --bg-elevated: #1f2026;
      --bg-muted:    #2c2e38;
      --bg-date:     #13141a;
      --border-base: #25272e;
      --color-body:  #c4c8d4;
    }
    [data-theme="light"] {
      --bg-base:     #f6f8fa;
      --bg-surface:  #ffffff;
      --bg-compose:  #f0f2f5;
      --bg-hover:    #eceef1;
      --bg-active:   #e5e8ec;
      --bg-elevated: #eef0f3;
      --bg-muted:    #dde0e6;
      --bg-date:     #f8f9fb;
      --border-base: #d8dce4;
      --color-body:  #1c1e23;
    }

    /* ── Light: text ───────────────────────────────── */
    [data-theme="light"] .text-neutral-100 { color: #1a1c22; }
    [data-theme="light"] .text-neutral-200 { color: #2c2e35; }
    [data-theme="light"] .text-neutral-300 { color: #3e4049; }
    [data-theme="light"] .text-neutral-400 { color: #5a5d6b; }
    [data-theme="light"] .text-neutral-500 { color: #737687; }
    [data-theme="light"] .text-neutral-600 { color: #9295a3; }
    [data-theme="light"] .text-neutral-700 { color: #b0b3c0; }
    [data-theme="light"] .hover\:text-neutral-100:hover { color: #0e1016; }
    [data-theme="light"] .hover\:text-neutral-200:hover { color: #1a1c22; }
    [data-theme="light"] .hover\:text-neutral-300:hover { color: #2c2e35; }
    [data-theme="light"] .hover\:text-white:hover        { color: #0e1016; }
    [data-theme="light"] .group:hover .group-hover\:text-neutral-100 { color: #0e1016; }
    [data-theme="light"] .group:hover .group-hover\:text-neutral-400 { color: #5a5d6b; }
    [data-theme="light"] .group:hover .group-hover\:text-white       { color: #0e1016; }

    /* ── Light: backgrounds ────────────────────────── */
    [data-theme="light"] .bg-neutral-800              { background-color: #ebeef3; }
    [data-theme="light"] .bg-neutral-700              { background-color: #e0e4eb; }
    [data-theme="light"] .hover\:bg-neutral-800:hover { background-color: #e4e8ef; }
    [data-theme="light"] .hover\:bg-neutral-700:hover { background-color: #d8dce4; }
    [data-theme="light"] .hover\:bg-neutral-600:hover { background-color: #cdd1da; }
    /* Primary action button */
    [data-theme="light"] .bg-neutral-100              { background-color: #1a1c22; }
    [data-theme="light"] .text-neutral-900             { color: #eef0f5; }
    [data-theme="light"] .hover\:bg-white:hover        { background-color: #2c2e38; }

    /* ── Light: borders ────────────────────────────── */
    [data-theme="light"] .border-neutral-700    { border-color: #d2d5dd; }
    [data-theme="light"] .border-neutral-800    { border-color: #dce0e8; }
    [data-theme="light"] .hover\:border-neutral-500:hover  { border-color: #737687; }
    [data-theme="light"] .hover\:border-neutral-600:hover  { border-color: #9295a3; }
    [data-theme="light"] .focus\:border-neutral-500:focus  { border-color: #737687; }
    [data-theme="light"] .focus-within\:border-neutral-500:focus-within { border-color: #737687; }

    /* ── Light: prose ──────────────────────────────── */
    [data-theme="light"] .prose-invert {
      --tw-prose-body:          #2a2d35;
      --tw-prose-headings:      #1a1c22;
      --tw-prose-lead:          #3e4049;
      --tw-prose-links:         #1a1c22;
      --tw-prose-bold:          #1a1c22;
      --tw-prose-counters:      #5a5d6b;
      --tw-prose-bullets:       #5a5d6b;
      --tw-prose-hr:            #d8dce4;
      --tw-prose-quotes:        #2a2d35;
      --tw-prose-quote-borders: #c8ccd6;
      --tw-prose-captions:      #5a5d6b;
      --tw-prose-code:          #2a2d35;
      --tw-prose-pre-code:      #2a2d35;
      --tw-prose-pre-bg:        #edf0f5;
      --tw-prose-th-borders:    #c8ccd6;
      --tw-prose-td-borders:    #d8dce4;
    }

    /* ── Light: placeholders ───────────────────────── */
    [data-theme="light"] .placeholder-neutral-700::placeholder { color: #b0b3c0; }
    [data-theme="light"] .placeholder-neutral-500::placeholder { color: #9ea1ae; }

    /* ── Scrollbar ─────────────────────────────────── */
    * { scrollbar-width: none; }
    ::-webkit-scrollbar { display: none; }
  </style>

  {% tailwind_css %}
  {% block extra_head %}{% endblock %}
</head>
<body x-data="{
       sidebarOpen: false,
       theme: document.documentElement.getAttribute('data-theme') || 'dark',
       toggleTheme() {
         this.theme = this.theme === 'dark' ? 'light' : 'dark';
         document.documentElement.setAttribute('data-theme', this.theme);
         localStorage.setItem('theme', this.theme);
       }
     }"
      class="h-screen flex flex-col overflow-hidden"
      style="background-color: var(--bg-base); color: var(--color-body);">

  <!-- Mobile top bar -->
  <header class="md:hidden shrink-0 flex items-center justify-between px-4 h-14 border-b"
          style="background-color: var(--bg-surface); border-color: var(--border-base);">
    <button @click="sidebarOpen = true"
            class="text-neutral-400 hover:text-neutral-100 transition-colors p-1.5 -ml-1">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <a href="{% url 'essays:feed' %}" class="text-sm font-semibold text-neutral-200">Papuan Thought</a>
    <div class="w-8"></div>
  </header>

  <!-- Layout row -->
  <div class="flex flex-1 min-h-0">

    <!-- Mobile: backdrop -->
    <div x-show="sidebarOpen" x-cloak
         @click="sidebarOpen = false"
         class="fixed inset-0 z-40 md:hidden bg-black/70"
         x-transition:enter="transition-opacity ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition-opacity ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
    </div>

    <!-- Mobile: slide-over sidebar -->
    <div class="fixed inset-y-0 left-0 z-50 w-64 flex flex-col border-r overflow-y-auto
                transition-transform duration-200 ease-in-out md:hidden"
         :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
         style="background-color: var(--bg-surface); border-color: var(--border-base);">
      {% include "partials/sidebar_left.html" %}
    </div>

    <!-- Desktop: inline sidebar -->
    <aside class="hidden md:flex md:w-56 md:shrink-0 md:flex-col border-r overflow-y-auto"
           style="background-color: var(--bg-surface); border-color: var(--border-base);">
      {% include "partials/sidebar_left.html" %}
    </aside>

    <!-- Main content -->
    <main class="flex-1 overflow-y-auto">
      <div class="max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 lg:py-10">
        {% block content %}{% endblock %}
      </div>
    </main>

  </div>

</body>
</html>
